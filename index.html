<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="机读目录格式编目员上岗证书查询">
  <title>机读目录格式编目员上岗证书</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <img class="header__logo" id="logo" src="public/logo.png" alt="" width="48" height="48" hidden>
      <h1 class="header__title" id="site-title">机读目录格式编目员上岗证书</h1>
    </header>

    <main class="main">
      <section class="panel panel--query" id="view-query" aria-label="查询">
        <form class="query-form" id="query-form" novalidate>
          <label class="field">
            <span class="field__label">姓名</span>
            <input class="field__input" type="text" id="input-name" name="name" autocomplete="name" placeholder="请输入姓名">
          </label>
          <label class="field">
            <span class="field__label">证书编号</span>
            <input class="field__input" type="text" id="input-cert" name="cert" inputmode="numeric" autocomplete="off" placeholder="请输入证书编号">
          </label>
          <p class="query-form__hint">姓名与证书编号至少填写一项</p>
          <button type="submit" class="btn btn--primary">查询</button>
        </form>
      </section>

      <section class="panel panel--results" id="view-results" aria-label="查询结果" hidden>
        <div class="results" id="results-container"></div>
        <button type="button" class="btn btn--secondary" id="btn-back">重新查询</button>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__org" id="org-name">国家图书馆培训中心</p>
    </footer>
  </div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
